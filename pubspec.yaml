name: appdle
description: "AppDle is a small personal proyect about creating and managing your 'dle' type games and playing them infinitely in your android, prioritazing battery usage, personalization and simplicity"
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  archive: ^3.6.1
  path_provider: ^2.1.3
  path: ^1.9.1
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.5.5
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48

flutter:
  uses-material-design: true